<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亚马逊评论分析工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
  :root{
    --ink:#1a2332; --ink-soft:#5a6577; --line:#e3e7ee; --bg:#f6f8fb;
    --panel:#ffffff; --accent:#1f6feb; --accent-soft:#e8f0fe;
    --ok:#0f9d58; --warn:#d98b00; --err:#d83b3b; --radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.6; padding:32px 20px;
  }
  .wrap{max-width:920px;margin:0 auto}
  header{margin-bottom:28px}
  h1{font-size:24px;font-weight:700;letter-spacing:-.3px}
  .sub{color:var(--ink-soft);font-size:14px;margin-top:6px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:18px}
  .panel-title{font-size:13px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .step-num{display:inline-flex;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;align-items:center;justify-content:center;font-weight:700}
  label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  input[type=text],input[type=password]{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;
  }
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .key-row{display:flex;gap:10px;align-items:flex-end}
  .key-row > div{flex:1}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:7px}
  .hint a{color:var(--accent)}
  .key-saved{font-size:12px;color:var(--ok);margin-top:7px;display:none}
  button{
    font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;border-radius:8px;
    padding:11px 18px;transition:.15s;
  }
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#1858c4}
  .btn-primary:disabled{background:#aebbd0;cursor:not-allowed}
  .btn-ghost{background:#eef1f6;color:var(--ink)}
  .btn-ghost:hover{background:#e2e7ef}
  .drop{
    border:2px dashed var(--line);border-radius:var(--radius);padding:42px 20px;text-align:center;
    cursor:pointer;transition:.15s;background:#fafbfd;
  }
  .drop:hover,.drop.over{border-color:var(--accent);background:var(--accent-soft)}
  .drop .ico{font-size:34px;opacity:.4}
  .drop .big{font-size:15px;font-weight:600;margin-top:10px}
  .drop .small{font-size:13px;color:var(--ink-soft);margin-top:4px}
  .file-chip{display:inline-flex;align-items:center;gap:8px;background:var(--accent-soft);color:var(--accent);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;margin-top:12px}
  .progress-box{display:none}
  .pbar-track{height:8px;background:#eef1f6;border-radius:5px;overflow:hidden;margin:10px 0 6px}
  .pbar-fill{height:100%;background:var(--accent);width:0%;transition:width .3s;border-radius:5px}
  .pstat{font-size:13px;color:var(--ink-soft)}
  .log{font-family:"SF Mono",Consolas,monospace;font-size:12px;background:#0f1729;color:#c8d4e8;border-radius:8px;padding:14px;margin-top:14px;max-height:200px;overflow-y:auto;display:none}
  .log div{padding:1px 0}
  .log .t-ok{color:#5fd99a}.log .t-warn{color:#f0c060}.log .t-err{color:#f08a8a}.log .t-ai{color:#7fb4ff}
  .result-box{display:none}
  .result-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:12px}
  .tab{padding:7px 13px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;background:#eef1f6;color:var(--ink-soft)}
  .tab.active{background:var(--accent);color:#fff}
  .summary-block{background:#fafbfd;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px;font-size:13px}
  .summary-block .srow{margin-bottom:7px}
  .summary-block .srow:last-child{margin-bottom:0}
  .summary-block b{color:var(--accent)}
  .tbl-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:8px}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th{background:#f0f3f8;text-align:left;padding:9px 11px;font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0}
  td{padding:9px 11px;border-bottom:1px solid #eef1f6;vertical-align:top}
  td.review{max-width:380px;min-width:280px}
  tr:hover td{background:#fafbfd}
  .col-tag{color:var(--accent);font-weight:500}
  .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:99}
  .toast.show{opacity:1}
  .warn-banner{background:#fff8ec;border:1px solid #f0d9a8;color:#8a6500;font-size:12.5px;padding:11px 14px;border-radius:8px;margin-top:12px;line-height:1.5}
</style>

<body>
<div class="wrap">
  <header>
    <h1>亚马逊评论分析工具 <span style="font-size:13px;color:#888;font-weight:normal;">V2.5</span></h1>
    <div class="sub">重新提取四字段 → 「总结」表(可勾选):应用场景总结(逐场景挖具体需求)+饼图数据·产品优势/问题反馈两层汇总·软件统计(带描述)</div>
  </header>

  <!-- 第一步:API Key -->
  <div class="panel">
    <div class="panel-title"><span class="step-num">1</span>填写智谱 API Key（只存本地浏览器，不上传）</div>
    <div class="key-row">
      <div>
        <input type="password" id="apiKey" placeholder="粘贴你的智谱 GLM API Key">
      </div>
      <button class="btn-ghost" id="saveKey">保存</button>
    </div>
    <div class="hint">没有 Key？去 <a href="https://www.bigmodel.cn/usercenter/proj-mgmt/apikeys" target="_blank">智谱开放平台</a> 免费申请（中国大陆手机号可注册）。Key 仅保存在你本机浏览器，不会发送到任何第三方。</div>
    <div class="key-saved" id="keySaved">✓ Key 已保存到本地</div>
  </div>

  <!-- 第二步:上传文件 -->
  <div class="panel">
    <div class="panel-title"><span class="step-num">2</span>上传原始数据文件</div>
    <div class="drop" id="drop">
      <div class="ico">📄</div>
      <div class="big">把 原始数据.xlsx 拖到这里，或点击选择</div>
      <div class="small">支持多型号（多个工作表），每个工作表是一个产品型号</div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    </div>
    <div id="fileInfo"></div>
    <div class="actions" style="flex-direction:column;align-items:flex-start;gap:12px;">
      <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);cursor:pointer;user-select:none;">
        <input type="checkbox" id="genSummary"> 生成「总结」表(应用场景总结+饼图数据·产品优势·问题反馈·软件汇总)
      </label>
      <button class="btn-primary" id="startBtn" disabled>开始处理</button>
    </div>
  </div>

  <!-- 进度 -->
  <div class="panel progress-box" id="progressBox">
    <div class="panel-title">处理进度</div>
    <div class="pstat" id="pstat">准备中…</div>
    <div class="pbar-track"><div class="pbar-fill" id="pbar"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:2px">
      <span id="ppct">0%</span>
      <span id="peta"></span>
    </div>
    <div class="log" id="log"></div>
  </div>

  <!-- 结果 -->
  <div class="panel result-box" id="resultBox">
    <div class="panel-title">处理完成</div>
    <div id="resultDone" style="font-size:14px;color:var(--ink);margin-bottom:4px"></div>
    <div class="actions">
      <button class="btn-primary" id="downloadBtn">下载分析 Excel</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions";
const MODEL = "glm-4.5-air"; // 强模型(你账户有1200万免费token);下面会自动关闭"深度思考"→约1.2秒/条。想省额度可改回 glm-4-flash(更弱,归并会不稳)
const $ = id => document.getElementById(id);
let rawWorkbook = null, resultData = null, resultSceneSummary = "", resultSceneTable = [], resultSoftwareStats = [];   // V1.1:应用场景总结/汇总 + 软件提及统计
let resultAdvTable = [], resultProbTable = [];   // V1.4:产品优势汇总 / 问题反馈汇总(纯计数)

/* ---------- 并发与重试(提速:多条评论同时分析,智谱限速由重试兜底) ---------- */
const CONCURRENCY = 4;            // 同时分析几条评论;glm-4.5-air 免费额度限速较严,4 较稳(太大易 429),付费可调大
const SUMMARY_TOP_N = 12;         // 汇总每个字段最多显示几个标签(按次数降序);明细仍保留全部,改这个数即可
const sleep = ms => new Promise(r=> setTimeout(r, ms));
const backoff = n => Math.min(8000, 600*Math.pow(2, n-1)) + Math.floor(Math.random()*300);
/* 并发池:最多 limit 个同时跑;worker 抛出带 __abort 标记的错误则整体中止 */
async function mapPool(items, limit, worker){
  const results = new Array(items.length);
  let next = 0, aborted = null;
  async function runner(){
    while(!aborted){
      const i = next++;
      if(i >= items.length) return;
      try{ results[i] = await worker(items[i], i); }
      catch(e){ if(e && e.__abort) aborted = e; return; }
    }
  }
  await Promise.all(Array.from({length: Math.min(limit, items.length)}, runner));
  if(aborted) throw aborted;
  return results;
}

/* ---------- API Key 本地存储 ---------- */
(function initKey(){
  const k = localStorage.getItem("zhipu_key");
  if(k){ $("apiKey").value = k; $("keySaved").style.display="block"; }
})();
$("saveKey").onclick = ()=>{
  const k = $("apiKey").value.trim();
  if(!k){ toast("请先填写 Key"); return; }
  localStorage.setItem("zhipu_key", k);
  $("keySaved").style.display="block";
  toast("Key 已保存");
};

/* ---------- 文件上传 ---------- */
const drop = $("drop"), fileInput = $("fileInput");
drop.onclick = ()=> fileInput.click();
drop.ondragover = e=>{ e.preventDefault(); drop.classList.add("over"); };
drop.ondragleave = ()=> drop.classList.remove("over");
drop.ondrop = e=>{ e.preventDefault(); drop.classList.remove("over"); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
fileInput.onchange = e=>{ if(e.target.files[0]) handleFile(e.target.files[0]); };

function handleFile(file){
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      rawWorkbook = XLSX.read(e.target.result, {type:"array"});
      const sheets = rawWorkbook.SheetNames;
      $("fileInfo").innerHTML = `<div class="file-chip">✓ ${file.name} · ${sheets.length} 个型号：${sheets.join("、")}</div>`;
      $("startBtn").disabled = false;
    }catch(err){
      toast("文件读取失败，请确认是 Excel 文件");
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ---------- 清洗逻辑(本地,纯规则) ---------- */
function cleanSheet(ws){
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  if(rows.length < 2) return [];
  const headers = rows[0].map(h=> String(h==null?"":h).toLowerCase());
  // 识别"评论内容"列:a-size-base 开头且不含 href
  const contentCols = [];
  headers.forEach((h,i)=>{
    if(h.indexOf("href")>=0 || h.indexOf("src")>=0) return;
    if(h.indexOf("helpful")>=0) return;
    if(h.indexOf("profile-name")>=0) return;
    if(h.indexOf("icon-alt")>=0) return;
    if(h.indexOf("a-size-base")===0) contentCols.push(i);
  });
  const NOISE_EXACT = new Set(["报告","有帮助","helpful","report","报告滥用"]);
  const isNoise = s=>{
    const t=s.trim();
    if(NOISE_EXACT.has(t.toLowerCase())) return true;
    if(/在美国审阅/.test(t) && t.length<30) return true;
    if(/^\d+\s*人觉得此评论有用$/.test(t)) return true;
    if(/^reviewed in the united states/i.test(t)) return true;
    if(/^\d+(\.\d)?\s*(分（满分 5 分）|out of 5 stars)$/.test(t)) return true;
    return false;
  };
  // 商品规格串:纯参数堆砌段落(多个参数命中且无主观评价句)
  const isSpecSegment = seg=>{
    const t=seg.trim();
    if(!t || t.length>140) return false;
    const specHits = (t.match(/\d+\s?GB\b|\d+\s?TB\b|固态硬盘|处理器|赛扬|英特尔|酷睿|Windows\s?11\s?专业版|N\d{3,4}|i[3579]-\d|Ryzen\s?\d/gi)||[]).length;
    const hasOpinion = /喜欢|满意|推荐|很棒|不错|失望|问题|完美|划算|值得|快|慢|安静|吵|好用|难用|强大|惊人|优惠/.test(t);
    return specHits>=3 && !hasOpinion;
  };
  const cleanCell = s=>{
    s = s.replace(/\s*\d{4}年\d{1,2}月\d{1,2}日在美国审阅\s*/g," ");
    s = s.replace(/(^|\s)报告($|\s)/g," ");
    return s.replace(/\s+/g," ").trim();
  };
  const reviews = [];
  for(let r=1;r<rows.length;r++){
    const parts=[];
    contentCols.forEach(c=>{
      const v=rows[r][c];
      if(v!=null){
        const s=String(v).trim();
        // 逐段:跳过噪音段和纯规格堆砌段
        if(s && s.toLowerCase()!=="nan" && !isNoise(s) && !isSpecSegment(s)) parts.push(s);
      }
    });
    if(parts.length){
      let merged = cleanCell(parts.join(" "));
      if(merged) reviews.push(merged);
    }
  }
  return reviews;
}

/* V2.2:扫表头找「评论内容」列 → 直接返回该列的评论文本数组(任何表只要有这列就能直接清洗,不要求别的列)。找不到返回 null。 */
function readReviewColumn(ws){
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  let hr = -1, col = -1;
  for(let r=0; r<Math.min(rows.length, 15); r++){
    const cells = (rows[r]||[]).map(c=> String(c==null?"":c).trim());
    const i = cells.findIndex(c=> c==="评论内容" || c==="评价内容" || c==="评论正文" || c==="评论");
    if(i>=0){ hr=r; col=i; break; }
  }
  if(hr<0) return null;
  const reviews = [];
  for(let r=hr+1; r<rows.length; r++){
    const v = (rows[r]||[])[col]; const s = v==null ? "" : String(v).trim();
    if(s) reviews.push(s);
  }
  return reviews.length ? reviews : null;
}
/* V1.2:读取"已分析好"的 sheet(有 应用场景/产品优势/问题反馈/相关软件 列)→ 直接返回明细;不是这种格式则返回 null,走原始数据流程 */
function readAnalyzedSheet(ws){
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  let hr = -1, col = null;
  for(let r=0; r<Math.min(rows.length, 15); r++){
    const cells = (rows[r]||[]).map(c=> String(c==null?"":c).trim());
    const iScene=cells.indexOf("应用场景"), iAdv=cells.indexOf("产品优势"), iProb=cells.indexOf("问题反馈"), iSw=cells.indexOf("相关软件");
    if(iScene>=0 && (iAdv>=0 || iProb>=0 || iSw>=0)){
      hr = r; col = {评论内容: cells.indexOf("评论内容"), 应用场景:iScene, 产品优势:iAdv, 问题反馈:iProb, 相关软件:iSw};
      break;
    }
  }
  if(hr < 0) return null;
  const get = (row,i)=> (i>=0 && row[i]!=null) ? String(row[i]).trim() : "";
  const details = [];
  for(let r=hr+1; r<rows.length; r++){
    const row = rows[r]||[];
    const d = {
      "评论内容": get(row, col.评论内容),
      "应用场景": cleanField(get(row, col.应用场景)),
      "产品优势": cleanField(get(row, col.产品优势)),
      "问题反馈": cleanField(get(row, col.问题反馈)),
      "相关软件": cleanField(get(row, col.相关软件))
    };
    if(d.评论内容 || d.应用场景 || d.产品优势 || d.问题反馈 || d.相关软件) details.push(d);
  }
  return details;
}

/* ---------- 调用智谱 API ---------- */
async function callAI(key, prompt, timeoutMs, _attempt){
  _attempt = _attempt || 1;
  timeoutMs = timeoutMs || 60000;   // 默认60秒;跨全部型号的大归并调用(标签很多)可传更长,如 180000
  const ctrl = new AbortController();
  const timer = setTimeout(()=> ctrl.abort(), timeoutMs);   // 超时兜底:防止某次请求卡住不返回,把整个流程卡死
  let resp;
  try{
    resp = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify(Object.assign({
        model:MODEL,
        messages:[{role:"user",content:prompt}],
        temperature:0.1,
        max_tokens:4096
      }, /glm-4\.[56]/.test(MODEL) ? {thinking:{type:"disabled"}} : {})),  // glm-4.5/4.6 关闭深度思考,否则又慢又费 token
      signal: ctrl.signal
    });
  }catch(netErr){
    clearTimeout(timer);
    const isTimeout = netErr && netErr.name==="AbortError";
    const maxTry = isTimeout ? 2 : 4;   // 超时最多试2次(避免越等越久),普通网络波动最多试4次
    if(_attempt < maxTry){ await sleep(backoff(_attempt)); return callAI(key, prompt, timeoutMs, _attempt+1); }
    throw new Error(isTimeout ? `请求超时(${Math.round(timeoutMs/1000)}秒)` : (netErr.message||"网络错误"));
  }
  clearTimeout(timer);
  if(!resp.ok){
    const txt = await resp.text();
    const is429 = resp.status===429 || /1302|速率限制|rate.?limit|频率/i.test(txt);   // 限速(含智谱 1302)
    // 限速:等更久、试更多次(1.5→3→6→12→20秒),把频率压下来,确保被限速的评论最终补回来不丢;5xx 普通退避
    if((is429 || resp.status>=500) && _attempt < (is429 ? 8 : 4)){
      const wait = is429 ? Math.min(20000, 1500*Math.pow(2,_attempt-1)) + Math.floor(Math.random()*600) : backoff(_attempt);
      await sleep(wait); return callAI(key, prompt, timeoutMs, _attempt+1);
    }
    throw new Error("API "+resp.status+": "+txt.slice(0,200));
  }
  const data = await resp.json();
  return data.choices[0].message.content;
}

/* 本地判断:这条评论是否需要翻译(英文→需要)。中文字远少于英文字母即判为英文,纯本地、瞬时、不耗 API */
function needsTranslate(s){
  s = String(s||"");
  const cjk = (s.match(/[一-鿿]/g)||[]).length;
  const latin = (s.match(/[A-Za-z]/g)||[]).length;
  return latin >= 4 && cjk < latin * 0.2;
}

/* 英文评论:单独一次"纯翻译"调用(翻译是 flash 最擅长的,分开做最稳)。鉴权错抛 __abort,其它失败退回原文 */
async function translateReview(key, review){
  try{
    const out = await callAI(key, `把下面这条英文用户评论整条翻成简体中文。产品名、型号、软件名、游戏名、系统名、接口名（如 KAMRUI、Ryzen 4300U、HDMI、Windows 11、Plex 等）保留原文。只输出翻译后的中文正文，不要引号、不要解释、不要 markdown。\n\n评论：\n${review}`);
    const t = String(out||"").replace(/^```[a-z]*\n?/i,"").replace(/```$/,"").trim();
    return t || review;
  }catch(e){
    if(/401|403|api key|invalid/i.test(e.message)){ const er=new Error(e.message); er.__abort=true; er.__auth=true; throw er; }
    return review;   // 翻译失败:退回原文,不丢评论
  }
}

function parseAIJson(text){
  let t = text.trim().replace(/^```json/i,"").replace(/^```/,"").replace(/```$/,"").trim();
  const m = t.match(/\{[\s\S]*\}/);
  if(m) t = m[0];
  try{ return JSON.parse(t); }
  catch(e){
    // 兜底:整体 JSON 解析失败时,逐字段用正则抢救,避免整条退回英文原文+空标签
    const grab = k => {
      const r = t.match(new RegExp('"'+k+'"\\s*:\\s*"((?:[^"\\\\]|\\\\.)*)"'));
      return r ? r[1].replace(/\\"/g,'"').replace(/\\n/g," ").trim() : "";
    };
    return {"应用场景":grab("应用场景"),"产品优势":grab("产品优势"),"问题反馈":grab("问题反馈"),"相关软件":grab("相关软件")};
  }
}

/* 清理单个字段:逗号统一成顿号,去掉空标签、空《》、去重 */
function cleanField(v){
  if(!v) return "";
  const seen = new Set();
  return String(v).split(/、|，|,|;|；/)
    .map(x=>x.trim())
    .filter(x=> x && x!=="《》" && x!=="无" && x!=="无。" && x.toLowerCase()!=="nan" && x!=="N/A")
    .filter(x=>{ if(seen.has(x)) return false; seen.add(x); return true; })
    .join("、");
}

/* ---------- 汇总统计(按次数降序,>=2标次数) ---------- */
function summarize(details, field){
  const cnt = {};
  details.forEach(d=>{
    const v = (d[field]||"").trim();
    if(!v) return;
    v.split(/、|，|,|;|；/).map(x=>x.trim()).filter(x=> x && x!=="《》").forEach(tag=>{
      cnt[tag] = (cnt[tag]||0)+1;
    });
  });
  const sorted = Object.entries(cnt).sort((a,b)=> b[1]-a[1]).slice(0, SUMMARY_TOP_N);  // 只取最高频前 N 个
  return sorted.map(([tag,n])=> n>=2 ? `${tag}（${n}次）` : tag).join("、");
}

/* ====== 第二遍:AI 现场归并汇总(零预设——不写死任何同义词表/黑名单) ======
   做法:把这型号所有评论里【如实提取】出来的标签丢给 AI,让它结合这批真实内容,
   判断哪些是同义→归并、哪些是硬件→剔除;AI 只能用真实出现过的词,不得新增。
   AI 只负责"分组",代码负责确定性地套用分组、数次数、排序。           */

/* 收集某型号某字段出现过的全部不同标签(去重) */
function distinctTags(details, field){
  const set = new Set();
  details.forEach(d=>{
    String(d[field]||"").split(/、|，|,|;|；/).map(x=>x.trim())
      .filter(x=> x && x!=="《》").forEach(t=> set.add(t));
  });
  return [...set];
}

/* 解析"纯文本行"归并结果 → {map:成员->标准, drop:剔除集合}。容错:坏行跳过,没分到组的标签后续原样保留 */
function parseFieldGroups(text, isSoftware){
  const map = new Map(), drop = new Set();
  let mode = "group";
  String(text||"").split(/\r?\n/).forEach(raw=>{
    let line = raw.trim().replace(/^[-*•]\s*/,"");
    if(!line) return;
    const sec = (line.match(/^[\[【](.+?)[\]】]\s*$/) || line.match(/^#+\s*(.+?)\s*$/));
    if(sec){ mode = /剔除|硬件|删除|删掉|剔掉/.test(sec[1]) ? "drop" : "group"; return; }
    if(mode==="drop"){
      // 只按顿号/逗号分隔(不按空格,否则"双4K HDMI接口"这种带空格的硬件名会被拆碎、漏剔)
      line.split(/、|，|,|;|；/).map(x=> x.trim().replace(/^["'`【\[]+/,"").replace(/["'`】\]。]+$/,"")).filter(Boolean).forEach(h=> drop.add(h));
      return;
    }
    const parts = line.split(/<=|<-|⇐|←|=>|→|::|=/);
    if(parts.length>=2){
      const std = parts[0].replace(/[【】\[\]"'`]/g,"").trim();
      const PH = /^(标准词|标准名|合并后的词|名字|写法\d*|原写法\d*|同义词\d*)$/;   // 提示词里的占位/示例词,别误当真实标签
      const JUNK = /其他|其它|其余|杂项|等等|若干/;                                  // "其他X"这类筐:作废该组,成员保留原样,绝不被冲成"其他"
      if(std && !PH.test(std) && !JUNK.test(std)){
        parts.slice(1).join(" ").split(/、|，|,|;|；/).map(x=>x.trim()).filter(x=> x && !PH.test(x)).forEach(mem=> map.set(mem, std));
      }
    }
  });
  return {map, drop};
}

/* 对一个字段做归并:纯文本行格式(不是嵌套 JSON),flash 最稳。空输入直接返回空映射(不浪费调用) */
async function aggregateField(key, fieldName, tags){
  if(!tags.length) return {map:new Map(), drop:new Set()};
  let kind, dropRule;
  if(fieldName==="相关软件"){
    kind = "软件名 / 游戏名";
    dropRule = "硬件 / 接口 / 配件（它们不是软件，例如 HDMI、固态硬盘、SSD、内存、显卡、摄像头、打印机、KVM、显示器、电源、风扇、扩展坞、网线、读卡器）";
  }else if(fieldName==="应用场景"){
    kind = "用户拿这台电脑【来做什么】的用途/场景（能填进\"我用它来＿＿\"或\"把它当＿＿用\"，如 办公、玩游戏、看视频、连接电视、做媒体服务器、远程办公、跑虚拟机）";
    dropRule = "不是\"用途\"的词——设备本身、一个动作、或泛词，填不进\"我用它来＿＿\"的，例如 电脑、运行、视频、照片、性能、设置、好用、外观";
  }else if(fieldName==="问题反馈"){
    kind = "用户反映的具体缺点 / 故障（如 风扇噪音大、4K视频卡顿、蓝牙故障、内存不够、售后差）";
    dropRule = "没有具体内容的笼统词，例如 其他、其它、杂项、问题、一般、还行";
  }else{ // 产品优势
    kind = "用户夸的优点（如 运行速度快、体积小巧、性价比高、散热好）";
    dropRule = "完全空泛、等于没说的词，例如 好、不错、一般、可以、还行（除此之外的优点【全部保留】）";
  }
  const prompt = `下面是从某迷你电脑评论里如实提取的"${fieldName}"候选标签（已去重）。这一栏【只应该放】：${kind}。

请做两件事，只能用下面真实出现的词、绝不新增：
① 归并：把【意思相同或高度近似】的合并成一个【完整、能独立看懂】的词（2~8 字，如 运行速度快、内存不足、接口不够）。不要缩成单个泛名词（如 内存、接口、性能、运行、功能 这种看不出具体意思的）。只出现一次、没有同义词的不用列（系统会自动原样保留）。
② 剔除（务必保守、少剔）：只把【明确不该出现在这一栏】的挑出来——也就是 ${dropRule}。除此之外【一律保留】；【绝不能因为觉得某个词"比较笼统/没信息量"就大量删除】，拿不准就留着。被剔除的应该只是少数几个，绝不该占大头。
【铁律】绝不要用 其他、其它、其余、其他优点、其他问题、杂项、等等 这类词当标准词或分组名（一个都不许出现）；归不进某个标准词的，就让它【原样保留】原本的具体说法；整栏真没内容就让它空着，绝不用"其他"占位。

输出【纯文本】，分两段，不要 JSON、不要解释：
[保留]
每行一个合并组，写成「合并后的词 <= 原写法1、原写法2」。示例（只是示范格式，别照抄示例里的词）：运行速度快 <= 速度快、开机快。没有要合并的就把这段留空。
[剔除]
一行，把该剔除的词用顿号隔开；没有就留空。

候选标签：
${tags.join("、")}`;
  const out = await callAI(key, prompt);
  const res = parseFieldGroups(out);
  // 安全阀:非软件字段若剔除超过 40%(且>3个)视为模型抽风、过度删除,放弃本次剔除、只保留归并,防止整栏被删空
  if(fieldName!=="相关软件" && res.drop.size > 3 && res.drop.size > tags.length*0.4){
    logLine(`  归并:字段[${fieldName}]剔除过多(${res.drop.size}/${tags.length})，已忽略剔除、只做归并`, "warn");
    res.drop = new Set();
  }
  return res;
}

/* 用某字段的分组,把一条标签串:剔硬件 → 套标准说法 → 去重(没分到组的原样保留,绝不丢内容) */
function applyAgg(value, m){
  if(!value || !m) return value||"";
  const seen = new Set();
  return String(value).split(/、|，|,|;|；/).map(x=>x.trim())
    .filter(x=> x && x!=="《》")
    .filter(x=> !m.drop.has(x))
    .map(x=> m.map.get(x) || x)
    .filter(x=>{ if(seen.has(x)) return false; seen.add(x); return true; })
    .join("、");
}

/* 第二遍主入口:四个字段【各自一次】纯文本归并(并行),flash 稳吐。某字段失败只影响该字段,不整体崩 */
async function aggregateModel(key, details, onField){
  const fields = ["应用场景","产品优势","问题反馈","相关软件"];
  const results = await Promise.all(fields.map(async f=>{
    const tags = distinctTags(details, f);
    try{
      const r = await aggregateField(key, f, tags);
      if(tags.length) logLine(`  归并完成:${f}（${tags.length} 个不同标签）`, "ok");
      if(onField) onField(f);
      return r;
    }catch(err){
      if(err && err.__auth) throw err;
      logLine(`  归并:字段[${f}]失败（${err.message}），该字段保持不归并`, "warn");
      if(onField) onField(f);
      return {map:new Map(), drop:new Set()};
    }
  }));
  const maps = {};
  fields.forEach((f,i)=> maps[f]=results[i]);
  return maps;
}

/* ---------- 进度与日志 ---------- */
function setProgress(done, total, txt, startTime){
  const pct = total ? done/total*100 : 0;
  $("pbar").style.width = pct.toFixed(1)+"%";
  $("ppct").textContent = pct.toFixed(0)+"%";
  $("pstat").textContent = txt;
  // 预估剩余时间:用已完成的平均耗时推算
  if(startTime && done>0 && done<total){
    const elapsed = (Date.now()-startTime)/1000;
    const remain = Math.round(elapsed/done*(total-done));
    $("peta").textContent = "预计剩余 "+fmtTime(remain);
  }
}
function fmtTime(s){
  if(s<60) return s+" 秒";
  const m=Math.floor(s/60), sec=s%60;
  return sec? `${m} 分 ${sec} 秒` : `${m} 分`;
}

/* 把汇总串转成 Excel 富文本:字段名加粗;只把【次数最高的前 3 个】"（N次）"标红(其余黑色) */
function summaryRich(label, str){
  const runs = [{text: label, font:{bold:true}}];
  const parts = String(str||"").split("、").filter(Boolean);
  let counted = 0;                                  // 已遇到几个带次数的(汇总已按次数降序,前3个即最高3个)
  parts.forEach((part, i)=>{
    if(i>0) runs.push({text:"、"});
    const m = part.match(/^(.*?)（(\d+)次）$/);
    if(m){
      runs.push({text: m[1]});
      const red = counted < 3;
      runs.push(red ? {text:`（${m[2]}次）`, font:{color:{argb:"FFFF0000"}, bold:true}} : {text:`（${m[2]}次）`});
      counted++;
    }else{
      runs.push({text: part});
    }
  });
  return {richText: runs};
}

}

/* V2.0:某应用场景大类的"特有需求"画像 —— 该场景【相对整体更突出】的优点/问题(lift排序) + 几条真实评论摘录,给AI挖【具体】需求(不再千篇一律) */
function sceneProfile(resultData, catName, gAdv, gProb, totalReviews){
  const lAdv={}, lProb={}, sw={}; const exc=[]; let sizeS=0;
  const bump=(m,v)=> String(v||"").split(/、|，|,|;|；/).map(x=>x.trim()).filter(x=> x && x!=="《》").forEach(t=> m[t]=(m[t]||0)+1);
  Object.keys(resultData).forEach(sn=> (resultData[sn].details||[]).forEach(d=>{
    const scenes = String(d["应用场景"]||"").split(/、|，|,|;|；/).map(x=>x.trim()).filter(Boolean);
    if(scenes.some(t=> sceneCatOf(t)===catName)){
      sizeS++; bump(lAdv,d["产品优势"]); bump(lProb,d["问题反馈"]); bump(sw,d["相关软件"]);
      const txt = String(d["评论内容"]||"").replace(/\s+/g," ").trim();
      if(txt.length>50 && exc.length<5) exc.push(txt.slice(0,150));
    }
  }));
  if(!sizeS) sizeS = 1;
  const distinct=(local,global)=> Object.entries(local).filter(([t,c])=> c>=2)
    .map(([t,c])=> [t,c,(c/sizeS)/(((global[t]||c))/totalReviews)])
    .sort((a,b)=> (b[2]-a[2]) || (b[1]-a[1])).slice(0,10).map(a=> `${a[0]}(${a[1]})`);
  const swTop = Object.entries(sw).sort((a,b)=> b[1]-a[1]).slice(0,8).map(a=> a[0]);
  return { adv: distinct(lAdv,gAdv), prob: distinct(lProb,gProb), sw: swTop, exc };
}

  models.forEach(sn=> (resultData[sn].details||[]).forEach(d=>{ totalReviews++; bump(gAdv,d["产品优势"]); bump(gProb,d["问题反馈"]); }));
  const top = sceneTable.slice(0, 8);

/* V1.6:把某列的真实标签【按 FIELD_CATS 规则归到大类】,返回 [{大类,描述,频次,占比,细分}] 按频次降序。
   纯代码、不调 AI;先匹配到先归;没匹配的进兜底大类(re:null),所以没有"其他"。 */
function categorizeField(resultData, field){
  const cats = FIELD_CATS[field]; if(!cats) return [];
  const def = cats.find(c=> !c.re) || cats[cats.length-1];
  const agg = aggregateAcross(resultData, field);          // [[标签,次数],...] 已按次数降序
  const total = agg.reduce((s,a)=> s+a[1], 0);
  if(!total) return [];
  const cnt = new Map();     // 大类 -> 总次数
  const subs = new Map();    // 大类 -> [[细分标签,次数],...]
  agg.forEach(([tag,c])=>{ const hit = cats.find(cc=> cc.re && cc.re.test(tag)) || def;
    cnt.set(hit.name,(cnt.get(hit.name)||0)+c);
    if(!subs.has(hit.name)) subs.set(hit.name, []);
    subs.get(hit.name).push([tag,c]);
  });
  const descOf = {}; cats.forEach(c=> descOf[c.name]=c.desc);
  return [...cnt.entries()].filter(e=> e[1]>0).sort((a,b)=> b[1]-a[1])
    .map(([name,c])=> ({大类:name, 描述:descOf[name]||"", 频次:c, 占比:Math.round(c/total*100),
                        细分:(subs.get(name)||[]).slice().sort((a,b)=> b[1]-a[1]) }));
}

/* V2.4:在【单个类目内部】用 AI 把同义明细合并(只在类目内、组名照抄真实最高频词、不造词、不跨类)。返回 member->组名 的 map。 */
async function aiMergeWithinCat(key, fieldName, catName, subs){
  const valid = new Set(subs.map(s=> s[0]));
  const rawCount = new Map(subs);
  const listed = subs.map(s=> `${s[0]}(${s[1]})`).join("、");
  const prompt = `下面是「${catName}」这个类别下的"${fieldName}"明细标签（括号是各自次数）。请把【意思相同、只是说法不同】的合并成一组——只有同义/近义/词形不同/详略不同才算同一组（例：体积小巧=小巧=体积小=尺寸小巧=超级紧凑；运行速度快=速度快=运行快=快速；风扇噪音大=风扇噪音=噪音大）。
【务必保守】不同的点必须分开（节省空间≠体积小巧；启动快≠运行快；散热好≠安静）；拿不准就别合并。
【组名·铁律】每组组名必须【逐字照抄】该组里出现次数最高的那个原标签，绝不自己造新词、绝不用清单里没有的词。
输出【纯文本】，每行一个合并组，格式：组名 <= 标签1、标签2、标签3。只列【真的要合并】的组；单独一个没同义词的不用写。不要 JSON、不要解释。
明细清单：
${listed}`;
  let out = "";
  try{ out = String(await callAI(key, prompt, 120000)||""); }catch(e){ return new Map(); }
  const map = new Map();
  out.split(/\r?\n/).forEach(line=>{
    line = line.trim().replace(/^[-*•\d.、)）\s]+/,"");
    const parts = line.split(/<=|<-|=>|⇐|←|＝|=(?!=)/);
    if(parts.length < 2) return;
    const members = parts.slice(1).join(" ").split(/、|，|,|;|；|\s+|\//)
      .map(x=> x.replace(/[（(]\s*\d+\s*[）)]/g,"").replace(/[「」『』\[\]【】]/g,"").trim()).filter(x=> valid.has(x));
    const head = parts[0].replace(/[（(]\s*\d+\s*[）)]/g,"").replace(/[「」『』\[\]【】]/g,"").trim();
    if(valid.has(head)) members.push(head);
    const uniq = [...new Set(members)];
    if(uniq.length >= 2){
      let best = uniq[0], bn = rawCount.get(best)||0;
      uniq.forEach(m=>{ const n = rawCount.get(m)||0; if(n > bn){ best = m; bn = n; } });
      uniq.forEach(m=>{ if(m !== best) map.set(m, best); });
    }
  });
  return map;
}
/* V2.4:把汇总表里【每个类目内部】的同义明细合并(类目较多明细的才过 AI;类目之间绝不互并)。原地改 table 的"细分",返回合并组数。 */
async function mergeDetailsByIntent(key, table, fieldName, onStep){
  if(!table || !table.length) return 0;
  let merged = 0;
  await mapPool(table, CONCURRENCY, async (r)=>{
    const subs = r.细分 || [];
    if(subs.length < 6){ if(onStep) onStep(); return; }   // 明细太少本来就干净,不用合并
    const map = await aiMergeWithinCat(key, fieldName, r.大类, subs);
    if(map && map.size){
      const cnt = new Map();
      subs.forEach(([tag,c])=>{ const g = map.get(tag) || tag; cnt.set(g, (cnt.get(g)||0)+c); });
      r.细分 = [...cnt.entries()].sort((a,b)=> b[1]-a[1]);
      merged += map.size;
    }
    if(onStep) onStep();
  });
  return merged;
}

function buildSoftwareStats(resultData){

  const catMax = {}; rows.forEach(r=> catMax[r.类别] = Math.max(catMax[r.类别]||0, r.次数));
  rows.sort((a,b)=> (catMax[b.类别]-catMax[a.类别]) || (b.次数-a.次数) || String(a.名称).localeCompare(String(b.名称)));
  return rows;
}

      try{ ws.addConditionalFormatting({ ref:`C${dataFirst}:C${dataLast}`, rules:[{type:"dataBar",gradient:false,cfvo:[{type:"min"},{type:"max"}],color:{argb:"FF63BE7B"}}] }); }catch(e){}
    };
    // 1. 应用场景总结(文字:占比 + 需求→解决方案;左侧蓝标签)
    if(resultSceneSummary){
      const lns = resultSceneSummary.split(/\r?\n/);
      const start = ws.rowCount + 1;
      lns.forEach(ln=>{ const r = ws.addRow(["", ln]); ws.mergeCells(r.number,2,r.number,5); r.getCell(2).alignment={vertical:"top",wrapText:true}; });
      const end = ws.rowCount;
      if(end>=start){ ws.mergeCells(start,1,end,1); const lc=ws.getCell(start,1); lc.value="应用场景\n总结"; lc.font={bold:true,color:{argb:"FFFFFFFF"},size:14}; lc.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FF4472C4"}}; lc.alignment={horizontal:"center",vertical:"middle",wrapText:true}; }
    }
    // 2. 应用场景汇总(扁平:应用场景 + 总频次 + 占比 → 选中前两列即可插饼图)
    if(resultSceneTable && resultSceneTable.length){
      ws.addRow([]); sectionTitle("应用场景汇总");
      const h = ws.addRow(["应用场景","总频次","占比","",""]);
      [1,2,3].forEach(ci=>{ const c=h.getCell(ci); c.font={bold:true}; c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF0F0F0"}}; c.alignment={horizontal:"center"}; });
      const first = ws.rowCount + 1;
      resultSceneTable.forEach(r=>{ const row=ws.addRow([r.大类, r.频次, r.占比+"%","",""]); row.getCell(1).alignment={vertical:"middle",wrapText:true}; row.getCell(2).alignment={horizontal:"center"}; row.getCell(3).alignment={horizontal:"center"}; });
      const last = ws.rowCount;
      try{ ws.addConditionalFormatting({ ref:`B${first}:B${last}`, rules:[{type:"dataBar",gradient:false,cfvo:[{type:"min"},{type:"max"}],color:{argb:"FF63BE7B"}}] }); }catch(e){}
    }
    // 3. 产品优势 / 问题反馈汇总(两层:大类 → 细分 → 次数)
    catSection("产品优势汇总", ["产品优势类目","产品优势明细","次数","占比"], resultAdvTable);
    catSection("问题反馈汇总", ["问题类目","问题明细","次数","占比"], resultProbTable);
    // 3. 软件提及统计(固定规则归类 + 类别合并 + 提及次数绿色数据条 + 占比)
    if(resultSoftwareStats && resultSoftwareStats.length){
      ws.addRow([]);
      sectionTitle("软件提及统计");
      const hd = ws.addRow(["软件类别","软件名称","提及次数","主要功能描述"]);
      hd.eachCell(c=>{ c.font={bold:true}; c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF0F0F0"}}; c.alignment={horizontal:"center",vertical:"middle"}; });
      const first = ws.rowCount + 1;
      resultSoftwareStats.forEach(r=>{ const row=ws.addRow([r.类别, r.名称, r.次数, r.描述||""]); row.getCell(1).alignment={horizontal:"center",vertical:"middle"}; row.getCell(2).alignment={horizontal:"left",vertical:"middle",wrapText:true}; row.getCell(3).alignment={horizontal:"center",vertical:"middle"}; row.getCell(4).alignment={horizontal:"left",vertical:"middle",wrapText:true}; });
      const last = ws.rowCount;
      let rr=first;
      while(rr<=last){ const cat=ws.getCell(rr,1).value; let e=rr; while(e+1<=last && ws.getCell(e+1,1).value===cat) e++; if(e>rr) ws.mergeCells(rr,1,e,1); ws.getCell(rr,1).alignment={horizontal:"center",vertical:"middle"}; rr=e+1; }
      try{ ws.addConditionalFormatting({ ref:`C${first}:C${last}`, rules:[{type:"dataBar",gradient:false,cfvo:[{type:"min"},{type:"max"}],color:{argb:"FF63BE7B"}}] }); }catch(e){}
    }
  }
  Object.keys(resultData).forEach(name=>{
    const {details, summary} = resultData[name];
    const ws = wb.addWorksheet(name.slice(0,31));
    ws.columns = [{width:60},{width:18},{width:20},{width:18},{width:18}];
    // 顶部4行汇总(加粗)
    [["应用场景：",summary["应用场景"]],["产品优势：",summary["产品优势"]],
     ["问题反馈：",summary["问题反馈"]],["相关软件：",summary["相关软件"]]].forEach(([k,v])=>{
      const row = ws.addRow([summaryRich(k, v)]);     // 富文本:字段名加粗 + 前3次数标红
      row.getCell(1).alignment = {wrapText:true, vertical:"top"};
    });
    // 明细表头(底色 + 加粗 + 居中)
    const head = ws.addRow(["评论内容","应用场景","产品优势","问题反馈","相关软件"]);
    head.eachCell(cell=>{
      cell.font = {bold:true};
      cell.fill = {type:"pattern", pattern:"solid", fgColor:{argb:"FFDCE6F1"}}; // 浅蓝底
      cell.alignment = {horizontal:"center", vertical:"center"};
      cell.border = {
        top:{style:"thin",color:{argb:"FF4472C4"}}, bottom:{style:"thin",color:{argb:"FF4472C4"}},
        left:{style:"thin",color:{argb:"FF4472C4"}}, right:{style:"thin",color:{argb:"FF4472C4"}}
      };
    });
    // 明细数据
    details.forEach(d=>{
      const row = ws.addRow([d["评论内容"],d["应用场景"],d["产品优势"],d["问题反馈"],d["相关软件"]]);
      row.getCell(1).alignment = {wrapText:true, vertical:"top"};
    });
  });
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "亚马逊评论分析结果.xlsx";
  a.click();
  URL.revokeObjectURL(a.href);
  toast("已下载");
};

/* ---------- toast ---------- */
let toastTimer;
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}
</script>
</body>
</html>
